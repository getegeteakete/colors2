<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="wall_a6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
  </defs>
  <!-- ceiling -->
  <rect width="600" height="60" fill="#ffffff"/>
  <!-- walls clean white -->
  <rect y="60" width="600" height="260" fill="url(#wall_a6)"/>
  <!-- modern white tile backsplash -->
  <rect x="120" y="120" width="210" height="110" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <!-- minimal tile lines -->
  <line x1="120" y1="155" x2="330" y2="155" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="120" y1="190" x2="330" y2="190" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="120" y1="225" x2="330" y2="225" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="190" y1="120" x2="190" y2="230" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="260" y1="120" x2="260" y2="230" stroke="#e0e0e0" stroke-width="0.8"/>
  <!-- modern kitchen counter -->
  <rect x="110" y="228" width="220" height="92" fill="#37474f" rx="4"/>
  <rect x="110" y="218" width="220" height="15" fill="url(#counter)" rx="3" stroke="#e0e0e0" stroke-width="1"/>
  <!-- sink modern -->
  <rect x="145" y="223" width="145" height="50" fill="#546e7a" rx="4"/>
  <rect x="150" y="228" width="135" height="40" fill="#455a64" rx="3"/>
  <!-- modern faucet -->
  <rect x="213" y="210" width="6" height="22" fill="#9e9e9e" rx="3"/>
  <path d="M216 210 Q230 200 240 210" fill="none" stroke="#9e9e9e" stroke-width="5" stroke-linecap="round"/>
  <!-- cabinet modern handles -->
  <rect x="145" y="268" width="25" height="4" fill="#9e9e9e" rx="2"/>
  <rect x="215" y="268" width="25" height="4" fill="#9e9e9e" rx="2"/>
  <rect x="285" y="268" width="25" height="4" fill="#9e9e9e" rx="2"/>
  <!-- shelf above sink -->
  <rect x="120" y="115" width="210" height="8" fill="#e0e0e0" rx="2"/>
  <!-- items on shelf -->
  <rect x="135" y="95" width="16" height="20" fill="#81d4fa" rx="3"/>
  <rect x="160" y="98" width="14" height="17" fill="#a5d6a7" rx="3"/>
  <!-- modern bathtub right -->
  <rect x="350" y="178" width="220" height="125" fill="#fafafa" rx="12" stroke="#e0e0e0" stroke-width="2"/>
  <rect x="362" y="190" width="196" height="105" fill="#e3f2fd" rx="8"/>
  <!-- tub rim chrome -->
  <rect x="350" y="175" width="220" height="8" fill="#bdbdbd" rx="4"/>
  <!-- modern tub faucet -->
  <rect x="452" y="175" width="6" height="20" fill="#bdbdbd" rx="3"/>
  <ellipse cx="455" cy="174" rx="10" ry="5" fill="#9e9e9e"/>
  <!-- tub water hint -->
  <rect x="362" y="240" width="196" height="55" fill="#b3e5fc" rx="6" opacity="0.5"/>
  <!-- small plant accent -->
  <rect x="72" y="290" width="20" height="30" fill="#4db6ac" rx="3"/>
  <ellipse cx="82" cy="285" rx="16" ry="12" fill="#80cbc4"/>
  <!-- floor modern tile -->
  <rect y="320" width="600" height="80" fill="#eceff1"/>
  <line x1="0" y1="345" x2="600" y2="345" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="0" y1="370" x2="600" y2="370" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="150" y1="320" x2="150" y2="400" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="300" y1="320" x2="300" y2="400" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="450" y1="320" x2="450" y2="400" stroke="#cfd8dc" stroke-width="1"/>
  <!-- label -->
  <rect x="20" y="20" width="100" height="30" rx="6" fill="#2e7d32" opacity="0.9"/>
  <text x="70" y="40" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">AFTER</text>
</svg>
