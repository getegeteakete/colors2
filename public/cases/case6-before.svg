<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="wall_b6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ccc8"/>
      <stop offset="100%" stop-color="#bcaaa4"/>
    </linearGradient>
  </defs>
  <!-- ceiling -->
  <rect width="600" height="60" fill="#efebe9"/>
  <!-- walls -->
  <rect y="60" width="600" height="260" fill="url(#wall_b6)"/>
  <!-- old tile back-splash -->
  <rect x="130" y="130" width="190" height="100" fill="#b0bec5"/>
  <!-- tile grid -->
  <line x1="130" y1="150" x2="320" y2="150" stroke="#90a4ae" stroke-width="1"/>
  <line x1="130" y1="170" x2="320" y2="170" stroke="#90a4ae" stroke-width="1"/>
  <line x1="130" y1="190" x2="320" y2="190" stroke="#90a4ae" stroke-width="1"/>
  <line x1="130" y1="210" x2="320" y2="210" stroke="#90a4ae" stroke-width="1"/>
  <line x1="165" y1="130" x2="165" y2="230" stroke="#90a4ae" stroke-width="1"/>
  <line x1="200" y1="130" x2="200" y2="230" stroke="#90a4ae" stroke-width="1"/>
  <line x1="235" y1="130" x2="235" y2="230" stroke="#90a4ae" stroke-width="1"/>
  <line x1="270" y1="130" x2="270" y2="230" stroke="#90a4ae" stroke-width="1"/>
  <line x1="305" y1="130" x2="305" y2="230" stroke="#90a4ae" stroke-width="1"/>
  <!-- mold on tiles -->
  <ellipse cx="170" cy="155" rx="8" ry="5" fill="#4a6741" opacity="0.4"/>
  <ellipse cx="240" cy="185" rx="10" ry="6" fill="#4a6741" opacity="0.35"/>
  <ellipse cx="290" cy="165" rx="7" ry="4" fill="#3d5e36" opacity="0.4"/>
  <!-- old sink unit -->
  <rect x="120" y="230" width="200" height="90" fill="#9e9e9e" rx="4"/>
  <rect x="130" y="220" width="180" height="20" fill="#bdbdbd" rx="3"/>
  <!-- sink basin scratched -->
  <ellipse cx="200" cy="255" rx="55" ry="30" fill="#b0bec5"/>
  <ellipse cx="200" cy="255" rx="45" ry="23" fill="#cfd8dc"/>
  <!-- faucet old -->
  <rect x="193" y="225" width="8" height="25" fill="#9e9e9e"/>
  <rect x="180" y="224" width="34" height="6" fill="#9e9e9e" rx="3"/>
  <!-- rust stain under faucet -->
  <ellipse cx="200" cy="248" rx="12" ry="8" fill="#a1887f" opacity="0.4"/>
  <!-- cabinet handles old -->
  <rect x="150" y="273" width="30" height="5" fill="#757575" rx="2"/>
  <rect x="225" y="273" width="30" height="5" fill="#757575" rx="2"/>
  <!-- old bathtub right side -->
  <rect x="360" y="180" width="200" height="120" fill="#cfd8dc" rx="8"/>
  <rect x="370" y="190" width="180" height="100" fill="#b0bec5" rx="6"/>
  <!-- water stains in tub -->
  <ellipse cx="460" cy="240" rx="50" ry="20" fill="#90a4ae" opacity="0.4"/>
  <!-- faucet old tub -->
  <rect x="452" y="182" width="8" height="20" fill="#9e9e9e"/>
  <rect x="440" y="180" width="34" height="6" fill="#9e9e9e" rx="3"/>
  <!-- rust -->
  <ellipse cx="460" cy="195" rx="15" ry="8" fill="#a1887f" opacity="0.35"/>
  <!-- floor old -->
  <rect y="320" width="600" height="80" fill="#a1887f"/>
  <!-- label -->
  <rect x="20" y="20" width="100" height="30" rx="6" fill="#c62828" opacity="0.9"/>
  <text x="70" y="40" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">BEFORE</text>
</svg>
