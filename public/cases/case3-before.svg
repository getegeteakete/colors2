<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="sky_b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#cfd8dc"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky_b3)"/>
  <!-- sidewalk -->
  <rect y="340" width="600" height="60" fill="#90a4ae"/>
  <rect y="336" width="600" height="8" fill="#78909c"/>
  <!-- building facade old -->
  <rect x="60" y="60" width="480" height="280" fill="#bdbdbd"/>
  <!-- wall stains/grime -->
  <rect x="60" y="60" width="480" height="280" fill="#9e9e9e" opacity="0.2"/>
  <ellipse cx="200" cy="200" rx="80" ry="60" fill="#757575" opacity="0.15"/>
  <ellipse cx="450" cy="280" rx="60" ry="40" fill="#616161" opacity="0.12"/>
  <!-- rusty sign board area -->
  <rect x="100" y="70" width="400" height="80" fill="#9e9e9e" stroke="#757575" stroke-width="2"/>
  <rect x="110" y="80" width="380" height="60" fill="#8d8d8d"/>
  <text x="300" y="118" text-anchor="middle" fill="#616161" font-size="22" font-family="sans-serif" font-weight="bold">○○ SHOP</text>
  <!-- shop windows x3 old -->
  <rect x="80" y="175" width="120" height="120" fill="#90a4ae" stroke="#78909c" stroke-width="3"/>
  <rect x="85" y="180" width="110" height="110" fill="#b0bec5" opacity="0.4"/>
  <rect x="240" y="175" width="120" height="120" fill="#90a4ae" stroke="#78909c" stroke-width="3"/>
  <rect x="245" y="180" width="110" height="110" fill="#b0bec5" opacity="0.4"/>
  <rect x="400" y="175" width="120" height="120" fill="#90a4ae" stroke="#78909c" stroke-width="3"/>
  <rect x="405" y="180" width="110" height="110" fill="#b0bec5" opacity="0.4"/>
  <!-- awning faded -->
  <polygon points="60,165 540,165 520,185 80,185" fill="#9e9e9e"/>
  <line x1="140" y1="165" x2="120" y2="185" stroke="#757575" stroke-width="1.5"/>
  <line x1="220" y1="165" x2="200" y2="185" stroke="#757575" stroke-width="1.5"/>
  <line x1="300" y1="165" x2="280" y2="185" stroke="#757575" stroke-width="1.5"/>
  <line x1="380" y1="165" x2="360" y2="185" stroke="#757575" stroke-width="1.5"/>
  <line x1="460" y1="165" x2="440" y2="185" stroke="#757575" stroke-width="1.5"/>
  <!-- door center -->
  <rect x="265" y="295" width="70" height="50" fill="#78909c" stroke="#607d8b" stroke-width="2"/>
  <!-- label -->
  <rect x="20" y="20" width="100" height="30" rx="6" fill="#c62828" opacity="0.9"/>
  <text x="70" y="40" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">BEFORE</text>
</svg>
