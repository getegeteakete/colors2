<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="sky_b5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd8dc"/>
      <stop offset="100%" stop-color="#eceff1"/>
    </linearGradient>
    <linearGradient id="van_b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eeeeee"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky_b5)"/>
  <!-- road -->
  <rect y="320" width="600" height="80" fill="#546e7a"/>
  <rect y="354" width="600" height="6" fill="#fdd835" opacity="0.7"/>
  <!-- road line dashes -->
  <rect x="40" y="354" width="60" height="6" fill="#546e7a"/>
  <rect x="160" y="354" width="60" height="6" fill="#546e7a"/>
  <rect x="280" y="354" width="60" height="6" fill="#546e7a"/>
  <rect x="400" y="354" width="60" height="6" fill="#546e7a"/>
  <rect x="520" y="354" width="60" height="6" fill="#546e7a"/>
  <!-- van body plain white -->
  <rect x="60" y="210" width="480" height="130" fill="url(#van_b)" rx="10"/>
  <!-- cab area -->
  <rect x="60" y="180" width="160" height="80" fill="#e0e0e0" rx="6"/>
  <!-- windshield -->
  <rect x="75" y="190" width="130" height="60" fill="#b2ebf2" rx="4" opacity="0.8"/>
  <!-- side windows plain van -->
  <rect x="240" y="220" width="90" height="60" fill="#b2ebf2" stroke="#bdbdbd" stroke-width="2" rx="3" opacity="0.6"/>
  <rect x="350" y="220" width="90" height="60" fill="#b2ebf2" stroke="#bdbdbd" stroke-width="2" rx="3" opacity="0.6"/>
  <!-- wheels -->
  <circle cx="150" cy="340" r="36" fill="#424242"/>
  <circle cx="150" cy="340" r="24" fill="#616161"/>
  <circle cx="150" cy="340" r="12" fill="#757575"/>
  <circle cx="450" cy="340" r="36" fill="#424242"/>
  <circle cx="450" cy="340" r="24" fill="#616161"/>
  <circle cx="450" cy="340" r="12" fill="#757575"/>
  <!-- bumpers -->
  <rect x="50" y="290" width="30" height="15" fill="#9e9e9e" rx="3"/>
  <rect x="520" y="290" width="30" height="15" fill="#9e9e9e" rx="3"/>
  <!-- lights -->
  <ellipse cx="75" cy="250" rx="14" ry="10" fill="#fff9c4" stroke="#e0e0e0" stroke-width="1"/>
  <ellipse cx="525" cy="250" rx="14" ry="10" fill="#ffcdd2" stroke="#e0e0e0" stroke-width="1"/>
  <!-- plain van - no branding note -->
  <rect x="200" y="240" width="220" height="50" fill="white" opacity="0.3" rx="4"/>
  <text x="310" y="270" text-anchor="middle" fill="#bdbdbd" font-size="18" font-family="sans-serif">（無地）</text>
  <!-- label -->
  <rect x="20" y="20" width="100" height="30" rx="6" fill="#c62828" opacity="0.9"/>
  <text x="70" y="40" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">BEFORE</text>
</svg>
