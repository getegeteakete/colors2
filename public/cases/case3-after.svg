  <rect x="240" y="185" width="120" height="120" fill="#e3f2fd" stroke="#90caf9" stroke-width="2" rx="2"/>
  <rect x="244" y="189" width="112" height="112" fill="#bbdefb" opacity="0.25"/>
  <rect x="255" y="240" width="90" height="50" fill="#fff8e1" rx="2" opacity="0.7"/>
  <text x="300" y="270" text-anchor="middle" fill="#e65100" font-size="11" font-family="sans-serif">キャンペーン</text>
  <rect x="400" y="185" width="120" height="120" fill="#e3f2fd" stroke="#90caf9" stroke-width="2" rx="2"/>
  <rect x="404" y="189" width="112" height="112" fill="#bbdefb" opacity="0.25"/>
  <rect x="415" y="240" width="90" height="50" fill="#fce4ec" rx="2" opacity="0.7"/>
  <text x="460" y="270" text-anchor="middle" fill="#880e4f" font-size="11" font-family="sans-serif">無料見積</text>
