<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="sky_b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#cfd8dc"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky_b1)"/>
  <rect y="300" width="600" height="100" fill="#8d9e7a"/>
  <!-- house body weathered -->
  <rect x="100" y="160" width="400" height="180" fill="#c7b8a0"/>
  <!-- color fade patches -->
  <rect x="100" y="160" width="150" height="80" fill="#baa98e" opacity="0.6"/>
  <rect x="300" y="230" width="200" height="110" fill="#b5a285" opacity="0.5"/>
  <!-- roof old -->
  <polygon points="80,170 300,60 520,170" fill="#6d4c41"/>
  <polygon points="80,170 300,60 520,170" fill="#4e342e" opacity="0.3"/>
  <!-- roof damage spots -->
  <ellipse cx="220" cy="110" rx="18" ry="10" fill="#3e2723" opacity="0.5"/>
  <ellipse cx="380" cy="120" rx="22" ry="12" fill="#3e2723" opacity="0.4"/>
  <!-- cracks -->
  <polyline points="175,180 185,210 178,240 190,265" fill="none" stroke="#795548" stroke-width="2"/>
  <polyline points="400,195 388,225 395,255" fill="none" stroke="#6d4c41" stroke-width="1.5"/>
  <line x1="310" y1="270" x2="340" y2="290" stroke="#795548" stroke-width="1.5"/>
  <!-- mold stains -->
  <ellipse cx="150" cy="270" rx="35" ry="22" fill="#558b2f" opacity="0.2"/>
  <ellipse cx="440" cy="290" rx="28" ry="18" fill="#33691e" opacity="0.2"/>
  <ellipse cx="280" cy="310" rx="40" ry="15" fill="#558b2f" opacity="0.15"/>
  <!-- window left dirty -->
  <rect x="140" y="205" width="85" height="75" fill="#90a4ae" stroke="#78909c" stroke-width="3" rx="1"/>
  <rect x="142" y="207" width="81" height="71" fill="#78909c" opacity="0.3"/>
  <line x1="182" y1="207" x2="182" y2="280" stroke="#607d8b" stroke-width="2"/>
  <line x1="140" y1="243" x2="225" y2="243" stroke="#607d8b" stroke-width="2"/>
  <!-- window right dirty -->
  <rect x="375" y="205" width="85" height="75" fill="#90a4ae" stroke="#78909c" stroke-width="3" rx="1"/>
  <rect x="377" y="207" width="81" height="71" fill="#78909c" opacity="0.3"/>
  <line x1="417" y1="207" x2="417" y2="280" stroke="#607d8b" stroke-width="2"/>
  <line x1="375" y1="243" x2="460" y2="243" stroke="#607d8b" stroke-width="2"/>
  <!-- door faded -->
  <rect x="245" y="240" width="70" height="100" fill="#8d6e63" rx="2"/>
  <circle cx="305" cy="293" r="5" fill="#bdbdbd"/>
  <!-- label -->
  <rect x="20" y="20" width="100" height="30" rx="6" fill="#c62828" opacity="0.9"/>
  <text x="70" y="40" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">BEFORE</text>
</svg>
