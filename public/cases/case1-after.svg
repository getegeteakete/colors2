<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- sky gradient -->
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90caf9"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
    <linearGradient id="wall1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky1)"/>
  <!-- ground -->
  <rect y="300" width="600" height="100" fill="#a5d6a7"/>
  <!-- house body - fresh white -->
  <rect x="100" y="160" width="400" height="180" fill="url(#wall1)" stroke="#e0e0e0" stroke-width="1"/>
  <!-- roof - new dark -->
  <polygon points="80,170 300,60 520,170" fill="#37474f"/>
  <polygon points="85,170 300,65 515,170" fill="#455a64"/>
  <!-- roof ridge -->
  <line x1="80" y1="170" x2="520" y2="170" stroke="#263238" stroke-width="3"/>
  <!-- accent color band -->
  <rect x="100" y="310" width="400" height="12" fill="#1565c0"/>
  <!-- window left -->
  <rect x="140" y="205" width="85" height="75" fill="#e3f2fd" stroke="#90caf9" stroke-width="3" rx="2"/>
  <rect x="142" y="207" width="39" height="71" fill="#bbdefb" opacity="0.5"/>
  <rect x="184" y="207" width="39" height="71" fill="#bbdefb" opacity="0.3"/>
  <line x1="183" y1="207" x2="183" y2="280" stroke="#90caf9" stroke-width="2"/>
  <line x1="140" y1="243" x2="225" y2="243" stroke="#90caf9" stroke-width="2"/>
  <!-- window right -->
  <rect x="375" y="205" width="85" height="75" fill="#e3f2fd" stroke="#90caf9" stroke-width="3" rx="2"/>
  <rect x="377" y="207" width="39" height="71" fill="#bbdefb" opacity="0.5"/>
  <rect x="419" y="207" width="39" height="71" fill="#bbdefb" opacity="0.3"/>
  <line x1="418" y1="207" x2="418" y2="280" stroke="#90caf9" stroke-width="2"/>
  <line x1="375" y1="243" x2="460" y2="243" stroke="#90caf9" stroke-width="2"/>
  <!-- door -->
  <rect x="245" y="240" width="70" height="100" fill="#1565c0" rx="3"/>
  <rect x="253" y="248" width="54" height="40" fill="#1976d2" rx="2" opacity="0.6"/>
  <circle cx="305" cy="293" r="5" fill="#ffd54f"/>
  <!-- flower pots -->
  <rect x="115" y="292" width="18" height="15" fill="#e64a19" rx="2"/>
  <ellipse cx="124" cy="291" rx="10" ry="6" fill="#81c784"/>
  <rect x="467" y="292" width="18" height="15" fill="#e64a19" rx="2"/>
  <ellipse cx="476" cy="291" rx="10" ry="6" fill="#81c784"/>
  <!-- label -->
  <rect x="20" y="20" width="100" height="30" rx="6" fill="#2e7d32" opacity="0.9"/>
  <text x="70" y="40" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">AFTER</text>
</svg>
