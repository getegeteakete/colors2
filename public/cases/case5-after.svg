<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="sky_a5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90caf9"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
    <linearGradient id="van_a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="van_stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fdd835"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky_a5)"/>
  <!-- road -->
  <rect y="320" width="600" height="80" fill="#455a64"/>
  <rect y="354" width="600" height="5" fill="#fdd835" opacity="0.8"/>
  <rect x="40" y="354" width="60" height="5" fill="#455a64"/>
  <rect x="160" y="354" width="60" height="5" fill="#455a64"/>
  <rect x="280" y="354" width="60" height="5" fill="#455a64"/>
  <rect x="400" y="354" width="60" height="5" fill="#455a64"/>
  <rect x="520" y="354" width="60" height="5" fill="#455a64"/>
  <!-- van body wrapped blue -->
  <rect x="60" y="210" width="480" height="130" fill="url(#van_a)" rx="10"/>
  <!-- stripe -->
  <rect x="60" y="275" width="480" height="20" fill="url(#van_stripe)" opacity="0.9"/>
  <!-- cab area -->
  <rect x="60" y="180" width="160" height="80" fill="#1565c0" rx="6"/>
  <!-- windshield -->
  <rect x="75" y="190" width="130" height="60" fill="#b2ebf2" rx="4" opacity="0.8"/>
  <!-- side windows -->
  <rect x="240" y="218" width="90" height="55" fill="#b2ebf2" stroke="#90caf9" stroke-width="2" rx="3" opacity="0.7"/>
  <rect x="350" y="218" width="90" height="55" fill="#b2ebf2" stroke="#90caf9" stroke-width="2" rx="3" opacity="0.7"/>
  <!-- branding text area -->
  <text x="320" y="252" text-anchor="middle" fill="white" font-size="30" font-family="sans-serif" font-weight="bold">COLORS</text>
  <text x="320" y="272" text-anchor="middle" fill="#fff9c4" font-size="13" font-family="sans-serif">塗装・リフォーム専門店</text>
  <!-- phone number -->
  <text x="390" y="302" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">0120-XXX-XXX</text>
  <!-- logo area left side -->
  <circle cx="110" cy="250" r="28" fill="white" opacity="0.15"/>
  <text x="110" y="256" text-anchor="middle" fill="white" font-size="16" font-family="sans-serif" font-weight="bold">C</text>
  <!-- wheels -->
  <circle cx="150" cy="340" r="36" fill="#212121"/>
  <circle cx="150" cy="340" r="26" fill="#424242"/>
  <circle cx="150" cy="340" r="14" fill="#616161"/>
  <circle cx="150" cy="340" r="5" fill="#9e9e9e"/>
  <circle cx="450" cy="340" r="36" fill="#212121"/>
  <circle cx="450" cy="340" r="26" fill="#424242"/>
  <circle cx="450" cy="340" r="14" fill="#616161"/>
  <circle cx="450" cy="340" r="5" fill="#9e9e9e"/>
  <!-- bumpers -->
  <rect x="50" y="290" width="28" height="14" fill="#bdbdbd" rx="3"/>
  <rect x="522" y="290" width="28" height="14" fill="#bdbdbd" rx="3"/>
  <!-- lights -->
  <ellipse cx="75" cy="248" rx="14" ry="10" fill="#fff9c4" stroke="#fdd835" stroke-width="1.5"/>
  <ellipse cx="525" cy="248" rx="14" ry="10" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1.5"/>
  <!-- label -->
  <rect x="20" y="20" width="100" height="30" rx="6" fill="#2e7d32" opacity="0.9"/>
  <text x="70" y="40" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">AFTER</text>
</svg>
